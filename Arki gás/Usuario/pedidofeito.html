<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKI - Gás</title>
    <style>
        *{
        padding: 0;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
    }
        #inicio{
        display: flex;
        justify-content: space-around;
        background-color: #3838da;
        padding: 30px;
    }
        h1{
        color: #000;
        font-size: 22px;
        margin-top: 2%;
        text-align: center;
    }
    p{
        text-align: center;
        margin-top: 2%;
    }
    #Cancelar{
    
    padding: 12px;
    width: 20%;
    border: none;
    cursor: pointer;
    background-color: red;
    color: #fff;
    margin-top: 4%;
}   
#caixa{
    text-align: center;
}
    </style>
</head>
<body>
    <div id="inicio">
        <h1>ARKI Gás</h1>
    </div>
    <div id="caixa">
        <h1>Seu pedido foi feito com sucesso</h1>
        <p>Seu pedido já se encontra pedente no administrador </p>
        <button id="Cancelar" onclick="Cancelar()">Voltar para  Página inicial</button>
    </div>
    <script src="cancelar.js"></script>
</body>
</html>
